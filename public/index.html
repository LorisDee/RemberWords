<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>REMBER - 轻量背单词</title>
  <style>
    :root {
      --primary: #FF7A00;
      --primary-light: #FF9E45;
      --bg: #FAFAFA;
      --card-bg: #FFFFFF;
      --text: #333333;
      --text-light: #888888;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    body { background: var(--bg); color: var(--text); display: flex; flex-direction: column; min-height: 100vh; align-items: center; justify-content: center; overflow-x: hidden; padding: 20px; }

    header { width: 100%; max-width: 500px; padding: 15px 10px; display: flex; justify-content: space-between; align-items: center; position: absolute; top: 0; }
    .logo { font-size: 22px; font-weight: 800; color: var(--primary); letter-spacing: 2px; }
    .nav-btn { background: none; border: 1px solid var(--primary); color: var(--primary); padding: 6px 14px; border-radius: 20px; cursor: pointer; font-size: 13px; transition: all 0.3s ease; }
    .nav-btn:hover { background: var(--primary); color: white; }

    .counter-box { background: rgba(255, 122, 0, 0.08); padding: 8px 16px; border-radius: 20px; color: var(--primary); font-weight: 600; font-size: 14px; margin-top: 70px; margin-bottom: 15px; animation: fadeIn 0.6s ease; text-align: center; }

    /* 主容器响应式 */
    .main-container { width: 100%; max-width: 400px; display: flex; flex-direction: column; align-items: center; justify-content: center; }

    /* 【功能3】优化手机端卡片舞台比例 */
    .card-stage { width: 100%; max-width: 340px; height: 230px; perspective: 1000px; cursor: pointer; margin-bottom: 25px; }
    .card-inner { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
    .card-stage.is-flipped .card-inner { transform: rotateY(180deg); }

    .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; background: var(--card-bg); border-radius: 24px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.04), 0 1px 3px rgba(0,0,0,0.01); border: 1px solid rgba(0,0,0,0.02); }
    .card-front { color: var(--text); }
    .card-back { transform: rotateY(180deg); color: var(--primary); }

    /* 【功能2】基础字体样式，大小改由JS动态调控 */
    .word-text { font-size: 32px; font-weight: 700; text-align: center; word-break: break-all; width: 100%; max-height: 140px; overflow: hidden; display: flex; align-items: center; justify-content: center; line-height: 1.3; }
    .hint { font-size: 12px; color: var(--text-light); margin-top: 12px; letter-spacing: 1px; }

    @keyframes slideLeft {
      0% { transform: translateX(0) scale(1); opacity: 1; }
      50% { transform: translateX(-120%) scale(0.95); opacity: 0; }
      51% { transform: translateX(120%) scale(0.95); opacity: 0; }
      100% { transform: translateX(0) scale(1); opacity: 1; }
    }
    .slide-animation { animation: slideLeft 0.45s cubic-bezier(0.4, 0, 0.2, 1); }

    .btn-next { background: var(--primary); border: none; color: white; width: 60px; height: 60px; border-radius: 50%; font-size: 22px; cursor: pointer; box-shadow: 0 6px 15px rgba(255,122,0,0.3); display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
    .btn-next:active { transform: scale(0.95); }

    .settings { display: flex; gap: 15px; margin-top: 25px; font-size: 13px; color: var(--text-light); }
    .settings label { display: flex; align-items: center; gap: 5px; cursor: pointer; }
    .settings input[type="radio"] { accent-color: var(--primary); }

    /* 弹窗响应式设计 */
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(5px); align-items: center; justify-content: center; z-index: 100; padding: 15px; }
    .modal.show { display: flex; }
    .modal-content { background: white; padding: 30px 25px; border-radius: 24px; width: 100%; max-width: 350px; box-shadow: 0 15px 30px rgba(0,0,0,0.08); position: relative; animation: fadeIn 0.3s ease; }

    .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; color: var(--text); }
    .close-btn { position: absolute; top: 15px; right: 15px; background: none; border: none; font-size: 22px; color: var(--text-light); cursor: pointer; }

    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; font-size: 12px; color: var(--text-light); margin-bottom: 5px; }
    .form-group input { width: 100%; padding: 12px; border: 1px solid #E5E5E5; border-radius: 12px; font-size: 14px; outline: none; }
    .form-group input:focus { border-color: var(--primary); }

    .submit-btn { width: 100%; background: var(--primary); color: white; border: none; padding: 12px; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 8px; }

    /* 【功能1】清空数据按钮样式 */
    .danger-btn { width: 100%; background: #FFF1F0; color: #F5222D; border: 1px solid #FFA39E; padding: 10px; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 15px; transition: all 0.2s; }
    .danger-btn:hover { background: #F5222D; color: white; }

    .file-box { border: 2px dashed #E5E5E5; border-radius: 12px; padding: 18px; text-align: center; cursor: pointer; color: var(--text-light); font-size: 13px; margin-bottom: 15px; }

    /* 【功能3】手机端特定部件细节缩放微调 */
    @media (max-width: 360px) {
      .logo { font-size: 18px; }
      .card-stage { height: 200px; }
      .word-text { font-size: 26px; }
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

<header>
  <div class="logo">REMBER</div>
  <button class="nav-btn" id="navBtn" onclick="openModal('loginModal')">家长登录</button>
</header>

<div class="counter-box">
  今日已背：<span id="todayCount">0</span> 词
</div>

<div class="main-container">
  <div class="card-stage" id="cardStage" onclick="flipCard()">
    <div class="card-inner">
      <div class="card-face card-front">
        <div class="word-text" id="frontText">Loading...</div>
        <div class="hint" id="frontHint">点击翻转</div>
      </div>
      <div class="card-face card-back">
        <div class="word-text" id="backText">加载中...</div>
        <div class="hint">点击返回</div>
      </div>
    </div>
  </div>
  <button class="btn-next" onclick="nextCard()">➔</button>
</div>

<div class="settings">
  <label><input type="radio" name="displayMode" value="en" checked onchange="changeMode()"> 默认显示英文</label>
  <label><input type="radio" name="displayMode" value="zh" onchange="changeMode()"> 默认显示中文</label>
</div>

<div class="modal" id="loginModal">
  <div class="modal-content">
    <button class="close-btn" onclick="closeModal('loginModal')">×</button>
    <div class="modal-title">家长身份验证</div>
    <div class="form-group"><label>账号</label><input type="text" id="username"></div>
    <div class="form-group"><label>密码</label><input type="password" id="password"></div>
    <button class="submit-btn" onclick="handleLogin()">登录后台</button>
  </div>
</div>

<div class="modal" id="adminModal">
  <div class="modal-content">
    <button class="close-btn" onclick="closeModal('adminModal')">×</button>
    <div class="modal-title">词库管理后台</div>
    <div class="counter-box" style="margin: 0 0 15px 0;">
      当前学生已背：<span id="adminTodayCount">0</span> 词
    </div>
    <form id="uploadForm" onsubmit="handleUpload(event)">
      <div class="file-box" onclick="document.getElementById('dictFile').click()">
        <span id="fileNameDisplay">点击选择 Excel 词库</span>
        <input type="file" id="dictFile" name="dictFile" accept=".xlsx, .xls" style="display:none;" onchange="updateFileName(this)">
      </div>
      <button type="submit" class="submit-btn">更新覆盖词库</button>
    </form>
    <button class="danger-btn" onclick="clearDailyCount()">一键清空今日数据</button>
    <button class="submit-btn" style="background:#666; margin-top:10px;" onclick="logout()">退出登录</button>
  </div>
</div>

<script>
  let words = [];
  let currentIndex = 0;
  let isFlipped = false;
  let displayMode = 'en';

  window.onload = function() {
    fetchWords();
    // 每隔 5 秒自动同步一次后台的数据看板（防止学生页面没刷新看不到清空）
    setInterval(syncCountOnly, 5000);
  };

  // --- 数据拉取与同步 ---
  async function fetchWords() {
    try {
      const response = await fetch('/api/words');
      const data = await response.json();
      words = data.words;
      document.getElementById('todayCount').innerText = data.todayCount;
      document.getElementById('adminTodayCount').innerText = data.todayCount;

      if(words.length > 0) {
        words.sort(() => Math.random() - 0.5);
        currentIndex = 0;
        renderCard();
      }
    } catch (err) { console.error(err); }
  }

  async function syncCountOnly() {
    try {
      const response = await fetch('/api/words');
      const data = await response.json();
      document.getElementById('todayCount').innerText = data.todayCount;
      document.getElementById('adminTodayCount').innerText = data.todayCount;
    } catch (err) { console.error(err); }
  }

  // 【功能2】根据文字长度动态调整字体大小的智能算法
  function adjustFontSize(element, text) {
    element.innerText = text;
    let len = text.length;

    if (len <= 10) {
      element.style.fontSize = '32px';
    } else if (len <= 20) {
      element.style.fontSize = '24px';
    } else if (len <= 40) {
      element.style.fontSize = '18px';
    } else {
      element.style.fontSize = '14px'; // 极长释义降到最小字号，确保不溢出
    }
  }

  function renderCard() {
    if(words.length === 0) return;
    const current = words[currentIndex];
    const stage = document.getElementById('cardStage');

    stage.classList.remove('is-flipped');
    isFlipped = false;

    const frontEl = document.getElementById('frontText');
    const backEl = document.getElementById('backText');

    if (displayMode === 'en') {
      adjustFontSize(frontEl, current.english);
      document.getElementById('frontHint').innerText = "点击查看中文";
      adjustFontSize(backEl, current.chinese);
    } else {
      adjustFontSize(frontEl, current.chinese);
      document.getElementById('frontHint').innerText = "点击查看英文";
      adjustFontSize(backEl, current.english);
    }
  }

  function flipCard() {
    document.getElementById('cardStage').classList.toggle('is-flipped');
    isFlipped = !isFlipped;
  }

  async function nextCard() {
  if(words.length === 0) return;

  // 1. 抓到整张卡片和背面的中文元素
  // 💡 【注意】：请把 'card' 和 'word-back' 换成你 HTML 里实际的卡片 ID 和中文容器 ID
  const cardElement = document.getElementById('card'); 
  const chineseView = document.getElementById('word-back'); 

  // 2. 🔥 【物理隐形】：在切卡的一瞬间，直接把中文的外观设为透明/隐藏
  // 这样不论卡片怎么晃、怎么翻，背面都是一片空白
  if (chineseView) chineseView.style.opacity = '0';
  if (cardElement) cardElement.classList.remove('flipped'); 

  const stage = document.getElementById('cardStage');
  stage.classList.add('slide-animation');

  // 向后端递增数据
  const res = await fetch('/api/count/add', { method: 'POST' });
  const data = await res.json();
  document.getElementById('todayCount').innerText = data.todayCount;
  document.getElementById('adminTodayCount').innerText = data.todayCount;

  // 3. 在卡片滑到一半时，悄悄换上新词的字
  setTimeout(() => {
    currentIndex = (currentIndex + 1) % words.length;
    renderCard();
  }, 220);

  // 4. 🔥 【重新通电】：450毫秒后，整个滑出滑进的动画彻底结束了
  // 卡片已经安稳地以“英文正面”停在屏幕中央，这时我们悄悄恢复中文的可见性
  setTimeout(() => { 
    stage.classList.remove('slide-animation'); 
    if (chineseView) chineseView.style.opacity = '1'; // 恢复可见，此时它安分地呆在背面
  }, 450);
}

  // 【功能1】家长一键清空统计数据
  async function clearDailyCount() {
    if (!confirm('确定要清空今日的背单词统计数据吗？此操作将立即同步。')) return;
    try {
      const res = await fetch('/api/count/clear', { method: 'POST' });
      const data = await res.json();
      document.getElementById('todayCount').innerText = data.todayCount;
      document.getElementById('adminTodayCount').innerText = data.todayCount;
      alert('数据已成功清空！');
    } catch (err) { alert('清空失败'); }
  }

  function changeMode() {
    const modes = document.getElementsByName('displayMode');
    for(let mode of modes) { if(mode.checked) displayMode = mode.value; }
    renderCard();
  }

  // --- 弹窗与交互 ---
  function openModal(id) { document.getElementById(id).classList.add('show'); }
  function closeModal(id) { document.getElementById(id).classList.remove('show'); }

  async function handleLogin() {
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    if (res.ok) {
      closeModal('loginModal');
      openModal('adminModal');
      document.getElementById('navBtn').innerText = "管理后台";
      document.getElementById('navBtn').onclick = () => openModal('adminModal');
    } else { alert('账号或密码错误！'); }
  }

  function logout() {
    closeModal('adminModal');
    document.getElementById('navBtn').innerText = "家长登录";
    document.getElementById('navBtn').onclick = () => openModal('loginModal');
    document.getElementById('username').value = '';
    document.getElementById('password').value = '';
  }

  function updateFileName(input) {
    if(input.files.length > 0) document.getElementById('fileNameDisplay').innerText = input.files[0].name;
  }

  async function handleUpload(e) {
    e.preventDefault();
    const fileInput = document.getElementById('dictFile');
    if(fileInput.files.length === 0) return alert('请先选择文件');
    const formData = new FormData();
    formData.append('dictFile', fileInput.files[0]);
    const res = await fetch('/api/upload', { method: 'POST', body: formData });
    const result = await res.json();
    if (result.success) {
      alert(result.message);
      closeModal('adminModal');
      fetchWords();
    } else { alert(result.message); }
  }
</script>
</body>
</html>
